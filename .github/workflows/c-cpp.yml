name: C CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile check
        run: |
          find solutions -name "*.c" -exec gcc {} -o /dev/null -lm \;
          echo "All files compiled successfully."
